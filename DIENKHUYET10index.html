<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Điền Khuyết 10 - PLAYTOEIC</title>
    <style>
        :root {
            --peach: #ffb7b2;
            --dark-peach: #ff8b94;
            --black: #1a1a1a;
            --gray: #2d2d2d;
            --white: #ffffff;
            --bright-green: #00ff00; /* Xanh lá cây tươi */
            --red: #ff6b6b;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .master-audio-container {
            background-color: var(--dark-peach);
            padding: 5px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #masterAudio {
            width: 80%;
            height: 30px;
        }

        .master-audio-container span {
            color: var(--black);
            font-weight: bold;
            font-size: 0.8rem;
        }

        header {
            background-color: var(--black);
            color: var(--peach);
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--peach);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 20px;
            padding: 20px;
        }

        .word-bank-column {
            flex: 1;
            background-color: var(--gray);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            border: 2px solid var(--peach);
        }

        .word-group h3 {
            color: var(--peach);
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,183,178,0.3);
            text-transform: uppercase;
        }

        .words-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .draggable-word {
            background-color: var(--peach);
            color: var(--black);
            padding: 5px 10px;
            border-radius: 12px;
            cursor: grab;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .draggable-word.used {
            opacity: 0.2;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .content-column {
            flex: 2.5;
            overflow-y: auto;
            padding-right: 15px;
        }

        .exercise-block {
            background-color: var(--gray);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 8px solid var(--peach);
        }

        .dialogue-section { margin-bottom: 25px; }

        .dialogue-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .section-title {
            color: var(--peach);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .play-btn {
            background-color: var(--peach);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .line { margin-bottom: 6px; line-height: 1.5; font-size: 0.95rem; }
        .speaker { font-weight: bold; color: var(--peach); min-width: 45px; display: inline-block; }

        .drop-zone {
            display: inline-block;
            min-width: 80px;
            border-bottom: 2px dashed var(--peach);
            text-align: center;
            margin: 0 4px;
            height: 20px;
            vertical-align: bottom;
            transition: color 0.3s;
        }

        .drop-zone.correct { 
            color: var(--bright-green); /* Xanh lá tươi */
            border-bottom: 2px solid var(--bright-green); 
            font-weight: bold; 
            text-shadow: none; /* Không viền sáng */
        }

        .drop-zone.wrong { border-bottom: 2px solid var(--red); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--peach); border-radius: 10px; }
    </style>
</head>
<body>

    ]},

        { s: "M-Cn", t: "I'd (76)_______ taking the yellow line to the last stop. It's a longer route, but it's closer to the (77)_______.", a: ["recommend", "studio"] }
    ]}
];

    function init() {
        const bank = document.getElementById('wordBank');
        const content = document.getElementById('exerciseContent');
        const masterAudio = document.getElementById('masterAudio');

        for(let i=0; i<rawWordList.length; i+=30) {
            const group = document.createElement('div');
            group.className = 'word-group';
            group.innerHTML = `<h3>NHÓM ${Math.floor(i/30)+1}</h3><div class="words-container"></div>`;
            const container = group.querySelector('.words-container');
            
            let subList = rawWordList.slice(i, i+30);
            shuffleArray(subList);

            subList.forEach(w => {
                const el = document.createElement('div');
                el.className = 'draggable-word';
                el.draggable = true;
                el.innerText = w;
                el.id = `word-${Math.random().toString(36).substr(2, 9)}`;
                el.ondragstart = (e) => e.dataTransfer.setData("text", `${w}|${el.id}`);
                container.appendChild(el);
            });
            bank.appendChild(group);
        }

        data.forEach(part => {
            const block = document.createElement('div');
            block.className = 'exercise-block';
            let linesHtml = part.lines.map(line => {
                let currentAnswers = Array.isArray(line.a) ? [...line.a] : [line.a];
                let text = line.t.replace(/_______/g, () => {
                    const ans = currentAnswers.shift();
                    return `<span class="drop-zone" data-answer="${ans}"></span>`;
                });
                return `<div class="line"><span class="speaker">${line.s}:</span> ${text}</div>`;
            }).join('');

            block.innerHTML = `
                <div class="dialogue-header">
                    <button class="play-btn" data-start="${part.start}" data-end="${part.end}">▶</button>
                    <span class="section-title">Đoạn ${part.title}</span>
                </div>
                ${linesHtml}
            `;
            content.appendChild(block);
        });

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = (e) => e.preventDefault();
            zone.ondrop = (e) => {
                const [word, elId] = e.dataTransfer.getData("text").split("|");
                if (word === zone.dataset.answer) {
                    zone.innerText = word;
                    zone.className = 'drop-zone correct';
                    document.getElementById(elId).classList.add('used');
                } else {
                    zone.classList.add('wrong');
                    setTimeout(() => zone.classList.remove('wrong'), 500);
                }
            };
        });

        document.querySelectorAll('.play-btn').forEach(btn => {
btn.onclick = () => {
    const start = parseFloat(btn.dataset.start);
    const end = parseFloat(btn.dataset.end);

    const playSegment = () => {
        masterAudio.currentTime = start;
        masterAudio.play();

        const checkTime = () => {
            if (masterAudio.currentTime >= end) {
                masterAudio.pause();
                masterAudio.removeEventListener('timeupdate', checkTime);
            }
        };
        masterAudio.addEventListener('timeupdate', checkTime);
    };

    if (masterAudio.readyState >= 1) {
        playSegment();
    } else {
        masterAudio.addEventListener('loadedmetadata', playSegment, { once: true });
    }
};
        });
    }

    window.onload = init;
</script>
</body>
</html>
